version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    container_name: postgres
    hostname: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend-tester:
    build: app_be
    container_name: app-be-tester
    # Sovrascrive il comando per lanciare la suite di test
    command: ["python", "-m", "pytest", "tests/", "-v", "-o", "asyncio_mode=auto", "-o", "asyncio_default_fixture_loop_scope=function"]
    env_file:
      - .env
    volumes:
      # CRITICO: Il "citofono" di Docker. Serve a testcontainers
      # per creare il mini-database temporaneo isolato dal 'db' qui sopra.
      - /var/run/docker.sock:/var/run/docker.sock

  backend:
    build: app_be
    tty: true
    stdin_open: true
    container_name: app-be
    hostname: app-be
    ports:
      - "8000:8000"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_started
      #backend-tester:
      #  condition: service_completed_successfully
    restart: always

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    container_name: minio
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: