version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    container_name: postgres
    hostname: db
    networks:
      - app-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: app_be
    container_name: app_be
    hostname: app_be
    networks:
      - app-network
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      db:
        condition: service_started
      minio:
        condition: service_started
      backend-tester:
        condition: service_completed_successfully
    restart: always
    volumes:
      - ./app_be:/app_be

  backend-tester:
    build: app_be
    container_name: app-be-tester
    command: ["python", "-m", "pytest", "tests/unit", "tests/E2E", "-n", "auto", "-v", "-o", "asyncio_mode=auto"]
    env_file:
      - .env
    environment:
      # Sovrascriviamo l'endpoint di MinIO per i test in Docker
      - MINIO_ENDPOINT=minio:9000
      # Se la tua app usa una variabile specifica per l'URL di MinIO, usa quella
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    depends_on:
      minio:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    container_name: minio
    networks:
      - app-network
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data

  frontend:
    build: app_fe
    container_name: app_fe
    hostname: app_fe
    networks:
      - app-network
    ports:
      - "8080:80"
    restart: always

volumes:
  postgres_data:
  minio_data:
  be_data:

networks:
  app-network:
    driver: bridge